{% extends "base.html" %}

{% block title %}Investor Profile — StartupIQ{% endblock %}

{% block content %}
<div class="profile-container">
    <!-- Profile Header -->
    <div class="profile-header">
        <div class="profile-header-info">
            <h1 class="profile-title" id="profileTitle">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                    <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                </svg>
                <span id="profileTitleText">Investor Profile</span>
            </h1>
            <div class="profile-badges" id="profileBadges">
                <span class="profile-badge profile-badge-investor" id="investorBadge" style="display:none;">💼 Investor</span>
            </div>
        </div>
    </div>

    <!-- Profile Card -->
    <div class="profile-card" id="profileCard">
        <!-- Loading State -->
        <div class="profile-loading" id="profileLoading">
            <div class="country-spinner"></div>
            <span>Loading profile...</span>
        </div>

        <!-- Profile Form -->
        <form class="profile-form" id="investorForm" style="display:none;">
            <!-- Fund Info Section -->
            <div class="profile-section">
                <h3 class="profile-section-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
                    Fund Information
                </h3>
                <div class="profile-field-row">
                    <div class="profile-form-group">
                        <label class="profile-label" for="fundName">Fund / Firm Name <span class="required">*</span></label>
                        <input class="profile-input" type="text" id="fundName" placeholder="Your fund or firm name" required>
                    </div>
                    <div class="profile-form-group">
                        <label class="profile-label" for="investorType">Investor Type</label>
                        <select class="profile-input profile-select" id="investorType">
                            <option value="">Select type...</option>
                            <option value="Angel Investor">Angel Investor</option>
                            <option value="Venture Capital">Venture Capital</option>
                            <option value="Private Equity">Private Equity</option>
                            <option value="Family Office">Family Office</option>
                            <option value="Corporate VC">Corporate VC</option>
                            <option value="Accelerator">Accelerator</option>
                            <option value="Incubator">Incubator</option>
                            <option value="Micro VC">Micro VC</option>
                            <option value="Syndicate">Syndicate</option>
                            <option value="Individual">Individual</option>
                        </select>
                    </div>
                </div>
                <div class="profile-field-row">
                    <div class="profile-form-group">
                        <label class="profile-label" for="website">Website</label>
                        <input class="profile-input" type="url" id="website" placeholder="https://yourfund.com">
                    </div>
                    <div class="profile-form-group">
                        <label class="profile-label" for="linkedinUrl">LinkedIn</label>
                        <input class="profile-input" type="url" id="linkedinUrl" placeholder="https://linkedin.com/in/yourprofile">
                    </div>
                </div>
            </div>

            <!-- Investment Preferences Section -->
            <div class="profile-section">
                <h3 class="profile-section-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
                    Investment Preferences
                </h3>
                <div class="profile-field-row">
                    <div class="profile-form-group">
                        <label class="profile-label" for="investmentMin">Min Investment (USD)</label>
                        <input class="profile-input" type="number" id="investmentMin" min="0" step="1000" placeholder="e.g. 25000">
                    </div>
                    <div class="profile-form-group">
                        <label class="profile-label" for="investmentMax">Max Investment (USD)</label>
                        <input class="profile-input" type="number" id="investmentMax" min="0" step="1000" placeholder="e.g. 500000">
                    </div>
                </div>
                <div class="profile-form-group">
                    <label class="profile-label" for="preferredIndustries">Preferred Industries</label>
                    <input class="profile-input" type="text" id="preferredIndustries" placeholder="e.g. FinTech, HealthTech, AI (comma-separated)">
                </div>
                <div class="profile-field-row">
                    <div class="profile-form-group">
                        <label class="profile-label" for="preferredStages">Preferred Stages</label>
                        <input class="profile-input" type="text" id="preferredStages" placeholder="e.g. Seed, Series A (comma-separated)">
                    </div>
                    <div class="profile-form-group">
                        <label class="profile-label" for="preferredLocations">Preferred Locations</label>
                        <input class="profile-input" type="text" id="preferredLocations" placeholder="e.g. India, US, UK (comma-separated)">
                    </div>
                </div>
            </div>

            <!-- About Section -->
            <div class="profile-section">
                <h3 class="profile-section-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    About You
                </h3>
                <div class="profile-form-group">
                    <label class="profile-label" for="bio">Investor Bio</label>
                    <textarea class="profile-input profile-textarea" id="bio" rows="4" placeholder="Share your investment philosophy, portfolio highlights, and what you look for in startups..."></textarea>
                </div>
            </div>

            <!-- Actions -->
            <div class="profile-error" id="profileError"></div>
            <div class="profile-success" id="profileSuccess"></div>
            <div class="profile-actions">
                <button type="submit" class="profile-btn profile-btn-primary" id="profileSubmitBtn">
                    <span class="profile-btn-text" id="profileBtnText">Create Profile</span>
                    <span class="profile-btn-loader" style="display:none;"></span>
                </button>
                <button type="button" class="profile-btn profile-btn-danger" id="profileDeleteBtn" style="display:none;">
                    Delete Profile
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    var isEditMode = false;

    // Load profile on page load
    fetch('/profile/investor')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            document.getElementById('profileLoading').style.display = 'none';
            document.getElementById('investorForm').style.display = 'flex';

            if (data.exists && data.profile) {
                isEditMode = true;
                var p = data.profile;
                document.getElementById('profileTitleText').textContent = 'Edit Investor Profile';
                document.getElementById('profileBtnText').textContent = 'Update Profile';
                document.getElementById('profileDeleteBtn').style.display = 'inline-flex';
                document.getElementById('investorBadge').style.display = 'inline-flex';

                // Populate fields
                document.getElementById('fundName').value = p.fund_name || '';
                document.getElementById('investorType').value = p.investor_type || '';
                document.getElementById('website').value = p.website || '';
                document.getElementById('linkedinUrl').value = p.linkedin_url || '';
                document.getElementById('investmentMin').value = p.investment_min || '';
                document.getElementById('investmentMax').value = p.investment_max || '';
                document.getElementById('preferredIndustries').value = p.preferred_industries || '';
                document.getElementById('preferredStages').value = p.preferred_stages || '';
                document.getElementById('preferredLocations').value = p.preferred_locations || '';
                document.getElementById('bio').value = p.bio || '';
            } else {
                document.getElementById('profileTitleText').textContent = 'Create Investor Profile';
                document.getElementById('profileBtnText').textContent = 'Create Profile';
            }
        })
        .catch(function() {
            document.getElementById('profileLoading').style.display = 'none';
            document.getElementById('investorForm').style.display = 'flex';
        });

    // Form submit
    document.getElementById('investorForm').addEventListener('submit', function(e) {
        e.preventDefault();

        var errEl = document.getElementById('profileError');
        var sucEl = document.getElementById('profileSuccess');
        var btn = document.getElementById('profileSubmitBtn');
        var btnText = document.getElementById('profileBtnText');
        var loader = btn.querySelector('.profile-btn-loader');

        errEl.style.display = 'none';
        sucEl.style.display = 'none';

        var payload = {
            fund_name: document.getElementById('fundName').value.trim(),
            investor_type: document.getElementById('investorType').value,
            website: document.getElementById('website').value.trim(),
            linkedin_url: document.getElementById('linkedinUrl').value.trim(),
            investment_min: parseFloat(document.getElementById('investmentMin').value) || 0,
            investment_max: parseFloat(document.getElementById('investmentMax').value) || 0,
            preferred_industries: document.getElementById('preferredIndustries').value.trim(),
            preferred_stages: document.getElementById('preferredStages').value.trim(),
            preferred_locations: document.getElementById('preferredLocations').value.trim(),
            bio: document.getElementById('bio').value.trim(),
        };

        if (!payload.fund_name) {
            errEl.textContent = 'Fund / Firm name is required.';
            errEl.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btnText.textContent = isEditMode ? 'Updating...' : 'Creating...';
        loader.style.display = 'inline-block';

        fetch('/profile/investor', {
            method: isEditMode ? 'PUT' : 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
        })
        .then(function(r) { return r.json().then(function(d) { return { status: r.status, data: d }; }); })
        .then(function(result) {
            btn.disabled = false;
            loader.style.display = 'none';

            if (result.data.success) {
                sucEl.textContent = result.data.message;
                sucEl.style.display = 'block';
                if (!isEditMode) {
                    isEditMode = true;
                    document.getElementById('profileTitleText').textContent = 'Edit Investor Profile';
                    document.getElementById('profileDeleteBtn').style.display = 'inline-flex';
                    document.getElementById('investorBadge').style.display = 'inline-flex';
                }
                btnText.textContent = 'Update Profile';
                setTimeout(function() { sucEl.style.display = 'none'; }, 4000);
            } else {
                errEl.textContent = result.data.error || 'Something went wrong.';
                errEl.style.display = 'block';
                btnText.textContent = isEditMode ? 'Update Profile' : 'Create Profile';
            }
        })
        .catch(function() {
            btn.disabled = false;
            loader.style.display = 'none';
            btnText.textContent = isEditMode ? 'Update Profile' : 'Create Profile';
            errEl.textContent = 'Network error. Please try again.';
            errEl.style.display = 'block';
        });
    });

    // Delete handler
    document.getElementById('profileDeleteBtn').addEventListener('click', function() {
        if (!confirm('Are you sure you want to delete your investor profile? This cannot be undone.')) return;

        var errEl = document.getElementById('profileError');
        this.disabled = true;

        fetch('/profile/investor', { method: 'DELETE' })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.success) {
                    window.location.reload();
                } else {
                    errEl.textContent = data.error || 'Failed to delete.';
                    errEl.style.display = 'block';
                    document.getElementById('profileDeleteBtn').disabled = false;
                }
            })
            .catch(function() {
                errEl.textContent = 'Network error.';
                errEl.style.display = 'block';
                document.getElementById('profileDeleteBtn').disabled = false;
            });
    });
})();
</script>
{% endblock %}
