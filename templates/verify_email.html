{% extends "base.html" %}

{% block title %}Email Verification — StartupIQ{% endblock %}

{% block content %}
<div class="reset-password-container">
    <div class="reset-password-card">
        {% if success %}
        <!-- Verification successful -->
        <div class="reset-card-header">
            <div class="reset-icon" style="background: rgba(16, 185, 129, 0.15); color: #10b981;">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
            </div>
            <h2 class="reset-title">Email Verified!</h2>
            <p class="reset-subtitle">{{ message }}</p>
            <a href="/" class="auth-submit-btn" style="margin-top: 24px; text-decoration: none; display: inline-flex;">
                Go to Dashboard
            </a>
        </div>
        {% else %}
        <!-- Verification failed / expired -->
        <div class="reset-card-header">
            <div class="reset-icon reset-icon-error">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="15" y1="9" x2="9" y2="15"></line>
                    <line x1="9" y1="9" x2="15" y2="15"></line>
                </svg>
            </div>
            <h2 class="reset-title">Verification Failed</h2>
            <p class="reset-subtitle">{{ message }}</p>
            <a href="/" class="auth-submit-btn" style="margin-top: 24px; text-decoration: none; display: inline-flex;">
                Go to Homepage
            </a>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
