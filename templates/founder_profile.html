{% extends "base.html" %}

{% block title %}Founder Profile — StartupIQ{% endblock %}

{% block content %}
<div class="profile-container">
    <!-- Profile Header -->
    <div class="profile-header">
        <div class="profile-header-info">
            <h1 class="profile-title" id="profileTitle">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                    <path d="M2 17l10 5 10-5"></path>
                    <path d="M2 12l10 5 10-5"></path>
                </svg>
                <span id="profileTitleText">Founder Profile</span>
            </h1>
            <div class="profile-badges" id="profileBadges">
                <span class="profile-badge profile-badge-founder" id="founderBadge" style="display:none;">🚀 Founder</span>
            </div>
        </div>
    </div>

    <!-- Profile Card -->
    <div class="profile-card" id="profileCard">
        <!-- Loading State -->
        <div class="profile-loading" id="profileLoading">
            <div class="country-spinner"></div>
            <span>Loading profile...</span>
        </div>

        <!-- Profile Form -->
        <form class="profile-form" id="founderForm" style="display:none;">
            <!-- Startup Info Section -->
            <div class="profile-section">
                <h3 class="profile-section-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"></path><path d="M2 17l10 5 10-5"></path><path d="M2 12l10 5 10-5"></path></svg>
                    Startup Information
                </h3>
                <div class="profile-field-row">
                    <div class="profile-form-group">
                        <label class="profile-label" for="startupName">Startup Name <span class="required">*</span></label>
                        <input class="profile-input" type="text" id="startupName" placeholder="Your startup name" required>
                    </div>
                    <div class="profile-form-group">
                        <label class="profile-label" for="industry">Industry</label>
                        <input class="profile-input" type="text" id="industry" placeholder="e.g. FinTech, HealthTech, EdTech">
                    </div>
                </div>
                <div class="profile-field-row">
                    <div class="profile-form-group">
                        <label class="profile-label" for="fundingStage">Funding Stage</label>
                        <select class="profile-input profile-select" id="fundingStage">
                            <option value="">Select stage...</option>
                            <option value="Pre-Seed">Pre-Seed</option>
                            <option value="Seed">Seed</option>
                            <option value="Series A">Series A</option>
                            <option value="Series B">Series B</option>
                            <option value="Series C">Series C</option>
                            <option value="Series D+">Series D+</option>
                            <option value="IPO">IPO</option>
                            <option value="Bootstrapped">Bootstrapped</option>
                        </select>
                    </div>
                    <div class="profile-form-group">
                        <label class="profile-label" for="location">Location</label>
                        <input class="profile-input" type="text" id="location" placeholder="e.g. Bangalore, India">
                    </div>
                </div>
                <div class="profile-field-row">
                    <div class="profile-form-group">
                        <label class="profile-label" for="website">Website</label>
                        <input class="profile-input" type="url" id="website" placeholder="https://yourstartup.com">
                    </div>
                    <div class="profile-form-group">
                        <label class="profile-label" for="teamSize">Team Size</label>
                        <input class="profile-input" type="number" id="teamSize" min="1" value="1" placeholder="Number of team members">
                    </div>
                </div>
            </div>

            <!-- Pitch Section -->
            <div class="profile-section">
                <h3 class="profile-section-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                    Your Pitch
                </h3>
                <div class="profile-form-group">
                    <label class="profile-label" for="problemStatement">Problem Statement</label>
                    <textarea class="profile-input profile-textarea" id="problemStatement" rows="3" placeholder="What problem are you solving?"></textarea>
                </div>
                <div class="profile-form-group">
                    <label class="profile-label" for="solution">Solution</label>
                    <textarea class="profile-input profile-textarea" id="solution" rows="3" placeholder="How does your startup solve this problem?"></textarea>
                </div>
                <div class="profile-form-group">
                    <label class="profile-label" for="bio">Founder Bio</label>
                    <textarea class="profile-input profile-textarea" id="bio" rows="3" placeholder="Tell us about yourself and your journey..."></textarea>
                </div>
            </div>

            <!-- Funding Section -->
            <div class="profile-section">
                <h3 class="profile-section-title">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                    Funding & Resources
                </h3>
                <div class="profile-field-row">
                    <div class="profile-form-group">
                        <label class="profile-label" for="fundingNeeded">Funding Needed (USD)</label>
                        <input class="profile-input" type="number" id="fundingNeeded" min="0" step="1000" placeholder="e.g. 500000">
                    </div>
                    <div class="profile-form-group">
                        <label class="profile-label" for="pitchDeckUrl">Pitch Deck URL</label>
                        <input class="profile-input" type="url" id="pitchDeckUrl" placeholder="https://link-to-your-pitch-deck">
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="profile-error" id="profileError"></div>
            <div class="profile-success" id="profileSuccess"></div>
            <div class="profile-actions">
                <button type="submit" class="profile-btn profile-btn-primary" id="profileSubmitBtn">
                    <span class="profile-btn-text" id="profileBtnText">Create Profile</span>
                    <span class="profile-btn-loader" style="display:none;"></span>
                </button>
                <button type="button" class="profile-btn profile-btn-danger" id="profileDeleteBtn" style="display:none;">
                    Delete Profile
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    var isEditMode = false;

    // Load profile on page load
    fetch('/profile/founder')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            document.getElementById('profileLoading').style.display = 'none';
            document.getElementById('founderForm').style.display = 'flex';

            if (data.exists && data.profile) {
                isEditMode = true;
                var p = data.profile;
                document.getElementById('profileTitleText').textContent = 'Edit Founder Profile';
                document.getElementById('profileBtnText').textContent = 'Update Profile';
                document.getElementById('profileDeleteBtn').style.display = 'inline-flex';
                document.getElementById('founderBadge').style.display = 'inline-flex';

                // Populate fields
                document.getElementById('startupName').value = p.startup_name || '';
                document.getElementById('industry').value = p.industry || '';
                document.getElementById('fundingStage').value = p.funding_stage || '';
                document.getElementById('location').value = p.location || '';
                document.getElementById('website').value = p.website || '';
                document.getElementById('teamSize').value = p.team_size || 1;
                document.getElementById('problemStatement').value = p.problem_statement || '';
                document.getElementById('solution').value = p.solution || '';
                document.getElementById('bio').value = p.bio || '';
                document.getElementById('fundingNeeded').value = p.funding_needed || '';
                document.getElementById('pitchDeckUrl').value = p.pitch_deck_url || '';
            } else {
                document.getElementById('profileTitleText').textContent = 'Create Founder Profile';
                document.getElementById('profileBtnText').textContent = 'Create Profile';
            }
        })
        .catch(function() {
            document.getElementById('profileLoading').style.display = 'none';
            document.getElementById('founderForm').style.display = 'flex';
        });

    // Form submit
    document.getElementById('founderForm').addEventListener('submit', function(e) {
        e.preventDefault();

        var errEl = document.getElementById('profileError');
        var sucEl = document.getElementById('profileSuccess');
        var btn = document.getElementById('profileSubmitBtn');
        var btnText = document.getElementById('profileBtnText');
        var loader = btn.querySelector('.profile-btn-loader');

        errEl.style.display = 'none';
        sucEl.style.display = 'none';

        var payload = {
            startup_name: document.getElementById('startupName').value.trim(),
            industry: document.getElementById('industry').value.trim(),
            funding_stage: document.getElementById('fundingStage').value,
            location: document.getElementById('location').value.trim(),
            website: document.getElementById('website').value.trim(),
            team_size: parseInt(document.getElementById('teamSize').value) || 1,
            problem_statement: document.getElementById('problemStatement').value.trim(),
            solution: document.getElementById('solution').value.trim(),
            bio: document.getElementById('bio').value.trim(),
            funding_needed: parseFloat(document.getElementById('fundingNeeded').value) || 0,
            pitch_deck_url: document.getElementById('pitchDeckUrl').value.trim(),
        };

        if (!payload.startup_name) {
            errEl.textContent = 'Startup name is required.';
            errEl.style.display = 'block';
            return;
        }

        btn.disabled = true;
        btnText.textContent = isEditMode ? 'Updating...' : 'Creating...';
        loader.style.display = 'inline-block';

        fetch('/profile/founder', {
            method: isEditMode ? 'PUT' : 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
        })
        .then(function(r) { return r.json().then(function(d) { return { status: r.status, data: d }; }); })
        .then(function(result) {
            btn.disabled = false;
            loader.style.display = 'none';

            if (result.data.success) {
                sucEl.textContent = result.data.message;
                sucEl.style.display = 'block';
                if (!isEditMode) {
                    isEditMode = true;
                    document.getElementById('profileTitleText').textContent = 'Edit Founder Profile';
                    document.getElementById('profileDeleteBtn').style.display = 'inline-flex';
                    document.getElementById('founderBadge').style.display = 'inline-flex';
                }
                btnText.textContent = 'Update Profile';
                setTimeout(function() { sucEl.style.display = 'none'; }, 4000);
            } else {
                errEl.textContent = result.data.error || 'Something went wrong.';
                errEl.style.display = 'block';
                btnText.textContent = isEditMode ? 'Update Profile' : 'Create Profile';
            }
        })
        .catch(function() {
            btn.disabled = false;
            loader.style.display = 'none';
            btnText.textContent = isEditMode ? 'Update Profile' : 'Create Profile';
            errEl.textContent = 'Network error. Please try again.';
            errEl.style.display = 'block';
        });
    });

    // Delete handler
    document.getElementById('profileDeleteBtn').addEventListener('click', function() {
        if (!confirm('Are you sure you want to delete your founder profile? This cannot be undone.')) return;

        var errEl = document.getElementById('profileError');
        this.disabled = true;

        fetch('/profile/founder', { method: 'DELETE' })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.success) {
                    window.location.reload();
                } else {
                    errEl.textContent = data.error || 'Failed to delete.';
                    errEl.style.display = 'block';
                    document.getElementById('profileDeleteBtn').disabled = false;
                }
            })
            .catch(function() {
                errEl.textContent = 'Network error.';
                errEl.style.display = 'block';
                document.getElementById('profileDeleteBtn').disabled = false;
            });
    });
})();
</script>
{% endblock %}
